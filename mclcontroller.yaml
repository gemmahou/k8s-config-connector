apiVersion: apps/v1
kind: Deployment
metadata:
  name: multiclusterlease-controller-manager
  namespace: cnrm-system
spec:
  replicas: 1
  template:
    metadata:
      labels:
        control-plane: controller-manager-mcl
    spec:
      serviceAccountName: cnrm-controller-manager
      containers:
        - name: manager
          image: gcr.io/cnrm-yuhou-2/multiclusterlease/controller:latest
          command:
            - /manager
          args:
            - --gcs-bucket=kcc-global-leader-lock
  selector:
    matchLabels:
      control-plane: controller-manager-mcl